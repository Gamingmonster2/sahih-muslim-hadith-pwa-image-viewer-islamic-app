    div.appendChild(close);
    document.body.appendChild(div);

    // Show Function
    window.showPwaPrompt = function() {
        div.style.top = '20px'; // Slide Down
        
        // Auto Hide after 5 seconds
        setTimeout(function(){
             window.hidePwaPrompt();
        }, 5000);
    };

    // Hide Function
    window.hidePwaPrompt = function() {
        div.style.top = '-100px'; // Slide Up
    };

    // Install Click Logic
    btn.addEventListener('click', function() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(function(choiceResult) {
                deferredPrompt = null;
                window.hidePwaPrompt();
            });
        }
    });

    // Close Click
    close.addEventListener('click', function() {
        window.hidePwaPrompt();
    });
  }

  // Initialize
  window.addEventListener('load', function() {
      createInstallUI();
      
      // Service Worker Registration
      if ('serviceWorker' in navigator) {
        var swCode = "self.addEventListener('install', e => e.waitUntil(self.skipWaiting())); self.addEventListener('activate', e => e.waitUntil(self.clients.claim())); self.addEventListener('fetch', e => {});";
        var swBlob = new Blob([swCode], {type: 'text/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(swBlob));
      }
  });

  // Capture Install Event
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    deferredPrompt = e;
    
    // Show Prompt after 3 seconds delay
    setTimeout(function() {
        if(window.showPwaPrompt) window.showPwaPrompt();
    }, 3000);
  });

})();

    <style>
        /* Base Styles & Transitions */
        body {
            font-family: 'Cairo', sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .title-font {
            font-family: 'Amiri', serif;
        }

        /* Image Handling */
        .book-page-img {
            transition: filter 0.4s ease, mix-blend-mode 0.4s ease, opacity 0.5s ease;
            display: block;
            width: 100%;
            height: auto;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        /* --- Theme Logic --- */
        
        /* 1. Light Theme (Paper-like) */
        body.theme-light {
            background-color: #fdfbf7;
            color: #1f2937;
        }
        body.theme-light .book-page-img {
            mix-blend-mode: multiply;
            filter: contrast(1.02);
        }
        body.theme-light header {
            background-color: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid #e5e7eb;
        }
        body.theme-light .floating-bar {
            background-color: rgba(6, 58, 39, 0.95); /* Keep bar dark green for contrast */
            color: white;
        }

        /* 2. Sepia Theme (Vintage) */
        body.theme-sepia {
            background-color: #F2E8D5;
            color: #5c4b37;
        }
        body.theme-sepia .book-page-img {
            mix-blend-mode: multiply;
            filter: sepia(0.3) contrast(1.05) brightness(0.95);
        }
        body.theme-sepia header {
            background-color: rgba(234, 221, 207, 0.95);
            border-bottom: 1px solid #dcbfa3;
        }
        body.theme-sepia .floating-bar {
            background-color: rgba(92, 75, 55, 0.95);
            color: #F2E8D5;
        }

        /* 3. Dark Theme (Inspired by the Book Cover - Deep Green & Gold) */
        body.theme-dark {
            background-color: #032015; /* Very dark green */
            color: #F3E5AB; /* Light gold text */
        }
        body.theme-dark .book-page-img {
            /* Invert to make white pages dark, then tint slightly green/gold */
            filter: invert(1) hue-rotate(180deg) brightness(0.85) contrast(1.1) sepia(0.2);
            mix-blend-mode: screen;
        }
        body.theme-dark header {
            background-color: rgba(6, 58, 39, 0.95);
            border-bottom: 1px solid #D4AF37; /* Gold border */
        }
        body.theme-dark .floating-bar {
            background-color: rgba(3, 32, 21, 0.95);
            border: 1px solid #D4AF37;
            color: #D4AF37;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 3px; }
        body.theme-dark ::-webkit-scrollbar-thumb { background: #063A27; }

        /* Utilities */
        .glass {
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .hidden-menu {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-10px) scale(0.95);
        }
        .visible-menu {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0) scale(1);
        }
        
        /* Modal Animation */
        .modal-enter { opacity: 0; transform: scale(0.9); }
        .modal-enter-active { opacity: 1; transform: scale(1); transition: all 0.3s ease; }
        .modal-leave { opacity: 1; transform: scale(1); }
        .modal-leave-active { opacity: 0; transform: scale(0.9); transition: all 0.3s ease; pointer-events: none; }
    </style>

        let currentLang = localStorage.getItem('sahih-lang') || 'ar';

        function applyTranslations(lang) {
            const dict = translations[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dict[key]) {
                    el.textContent = dict[key];
                }
            });
            
            // Update document direction and lang attribute
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            
            // Update toggle button text
            document.getElementById('lang-indicator').textContent = lang === 'ar' ? 'EN' : 'AR';
        }

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            localStorage.setItem('sahih-lang', currentLang);
            applyTranslations(currentLang);
        }

        // Initialize translation
        applyTranslations(currentLang);

        // =========================================================================
        // ========= إدارة الأوضاع (Theme Management) =========
        // =========================================================================
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsMenu = document.getElementById('settingsMenu');
        let isMenuOpen = false;

        settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            isMenuOpen = !isMenuOpen;
            if (isMenuOpen) {
                settingsMenu.classList.remove('hidden-menu');
                settingsMenu.classList.add('visible-menu');
            } else {
                settingsMenu.classList.add('hidden-menu');
                settingsMenu.classList.remove('visible-menu');
            }
        });

        document.addEventListener('click', (e) => {
            if (isMenuOpen && !settingsMenu.contains(e.target) && !settingsBtn.contains(e.target)) {
                isMenuOpen = false;
                settingsMenu.classList.add('hidden-menu');
                settingsMenu.classList.remove('visible-menu');
            }
        });

        function changeTheme(theme) {
            document.body.classList.remove('theme-light', 'theme-sepia', 'theme-dark');
            document.body.classList.add(`theme-${theme}`);
            localStorage.setItem('sahih-theme', theme);
            
            // Update meta theme-color for mobile browsers
            const metaThemeColor = document.querySelector('meta[name="theme-color"]');
            if(theme === 'dark') metaThemeColor.setAttribute('content', '#032015');
            else if(theme === 'sepia') metaThemeColor.setAttribute('content', '#F2E8D5');
            else metaThemeColor.setAttribute('content', '#fdfbf7');

            isMenuOpen = false;
            settingsMenu.classList.add('hidden-menu');
            settingsMenu.classList.remove('visible-menu');
        }

        const savedTheme = localStorage.getItem('sahih-theme') || 'light';
        changeTheme(savedTheme);

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable fullscreen: ${err.message}`);

            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // =========================================================================

        // =========================================================================
        const modal = document.getElementById('infoModal');
        
        function toggleModal() {
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                // Trigger reflow
                void modal.offsetWidth;
                modal.classList.remove('modal-leave', 'modal-leave-active');
                modal.classList.add('modal-enter-active');
            } else {
                modal.classList.remove('modal-enter-active');
                modal.classList.add('modal-leave-active');
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 300); // match transition duration
            }
        }

        // =========================================================================
        // ========= تحميل الصور والمراقبة (Lazy Loading & Intersection) =========
        // =========================================================================
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('book-container');
            const loader = document.getElementById('loader');
            const pageNumberDisplay = document.getElementById('page-number');

            if(loader) loader.remove();

            if (rawImages.length === 0) {
                container.innerHTML = '<div class="p-10 text-center text-red-500">No images provided in rawImages array.</div>';
                return;
            }

            rawImages.forEach((url, index) => {
                const imgContainer = document.createElement('div');
                imgContainer.className = 'w-full relative min-h-[50vh] flex items-center justify-center mb-2 bg-gray-100 dark:bg-black/20 rounded-lg overflow-hidden';
                
                const img = document.createElement('img');
                // Use data-src for strict lazy loading if desired, but native loading="lazy" is usually enough
                img.src = url; 
                img.alt = `Page ${index + 1}`;
                img.loading = "lazy"; 
                img.className = 'book-page-img opacity-0'; 
                img.id = `book-page-${index}`;
                img.setAttribute('data-index', index);
                
                // For demonstration, real page is just index + 1
                img.setAttribute('data-real-page', index + 1);

                img.onload = () => {
                    img.classList.remove('opacity-0');
                    imgContainer.classList.remove('bg-gray-100', 'dark:bg-black/20');
                };
                img.onerror = () => {
                    imgContainer.innerHTML = `<div class="text-sm text-red-500 font-bold p-4 text-center">Error loading page ${index + 1}<br><span class="text-xs font-normal">${url}</span></div>`;
                };

                imgContainer.appendChild(img);
                container.appendChild(imgContainer);
            });

            // Intersection Observer to update page number
            const observerOptions = {
                root: null,
                rootMargin: '0px',
                threshold: 0.5 // Trigger when 50% of the image is visible
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const realPage = entry.target.getAttribute('data-real-page');
                        const index = entry.target.getAttribute('data-index');
                        pageNumberDisplay.textContent = realPage;
                        window.currentIndex = parseInt(index);
                    }
                });
            }, observerOptions);

            document.querySelectorAll('#book-container img').forEach(img => observer.observe(img));

            if(rawImages.length > 0) {
                pageNumberDisplay.textContent = "1";
                window.currentIndex = 0;
            }
        });

        // Navigation Functions
        window.currentIndex = 0;
        function scrollToNext() {
            // In RTL, "Next" visually means moving to a higher index, but physically scrolling down
            const nextIndex = window.currentIndex + 1;
            const target = document.getElementById(`book-page-${nextIndex}`);
            if (target) {
                // Offset calculation to account for fixed header
                const headerOffset = 80;
                const elementPosition = target.getBoundingClientRect().top;
                const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
                
                window.scrollTo({
                    top: offsetPosition,
                    behavior: "smooth"
                });
            }
        }
        function scrollToPrev() {
            const prevIndex = window.currentIndex - 1;
            const target = document.getElementById(`book-page-${prevIndex}`);
            if (target) {
                const headerOffset = 80;
                const elementPosition = target.getBoundingClientRect().top;
                const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
                
                window.scrollTo({
                    top: offsetPosition,
                    behavior: "smooth"
                });
            }
        }

                    "sizes": "192x192",
                    "type": "image/svg+xml"
                }
            ]
        };
        const manifestBlob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(manifestBlob);
        document.getElementById('manifest-link').setAttribute('href', manifestURL);

        // 2. Service Worker for Caching (Cache-First Strategy for Images)
        // Since we are in a single file, we construct the SW script as a Blob and register it.
        const swCode = `
            const CACHE_NAME = 'sahih-muslim-v1';
            
            self.addEventListener('install', event => {
                self.skipWaiting();
            });

            self.addEventListener('activate', event => {
                event.waitUntil(clients.claim());
            });

            self.addEventListener('fetch', event => {
                const request = event.request;
                
                // Cache-First strategy for images
                if (request.destination === 'image' || request.url.match(/\.(png|jpg|jpeg|gif|svg|webp)$/i)) {
                    event.respondWith(
                        caches.match(request).then(cachedResponse => {
                            if (cachedResponse) {
                                return cachedResponse; // Return from cache
                            }
                            // If not in cache, fetch from network and then cache it
                            return fetch(request).then(networkResponse => {
                                // Don't cache if not a valid response
                                if(!networkResponse || networkResponse.status !== 200 || networkResponse.type !== 'basic') {
                                    // For opaque responses (like cross-origin images without CORS), we can still cache them
                                    // but we check if it's a valid response object first.
                                    if(networkResponse && networkResponse.type === 'opaque') {
                                        const responseToCache = networkResponse.clone();
                                        caches.open(CACHE_NAME).then(cache => {
                                            cache.put(request, responseToCache);
                                        });
                                    }
                                    return networkResponse;
                                }
                                
                                const responseToCache = networkResponse.clone();
                                caches.open(CACHE_NAME).then(cache => {
                                    cache.put(request, responseToCache);
                                });
                                return networkResponse;
                            }).catch(() => {
                                // Fallback if network fails and not in cache
                                return new Response('Image offline');
                            });
                        })
                    );
                } else {
                    // Network-first for everything else (HTML, JS, CSS)
                    event.respondWith(
                        fetch(request).catch(() => caches.match(request))
                    );
                }
            });
        `;

        // Register the dynamic Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swBlob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(swBlob);
                
                navigator.serviceWorker.register(swUrl).then(registration => {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }).catch(err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>
